<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhagya Laxmi Motors Finance</title>
<style>
    :root {
        --primary: #1e1b4b;
        --primary-light: #3730a3;
        --primary-gradient: linear-gradient(135deg, #1e1b4b 0%, #3730a3 100%);
        --success: #059669;
        --success-light: #10b981;
        --accent: #f59e0b;
        --accent-light: #fbbf24;
        --danger: #dc2626;
        --danger-light: #ef4444;
        --text: #0f172a;
        --text-light: #64748b;
        --bg: #f8fafc;
        --glass: rgba(255, 255, 255, 0.7);
        --glass-border: rgba(255, 255, 255, 0.3);
        --shadow: 0 8px 32px rgba(30, 27, 75, 0.1);
        --shadow-lg: 0 20px 60px rgba(30, 27, 75, 0.15);
        --radius: 16px;
        --radius-sm: 12px;
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: linear-gradient(135deg, #e0e7ff 0%, #f0fdfa 50%, #fef3c7 100%);
        background-attachment: fixed;
        color: var(--text);
        min-height: 100vh;
        padding: 16px;
        line-height: 1.6;
    }

    body::before {
        content: '';
        position: fixed;
        top: -50%;
        right: -50%;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, rgba(30, 27, 75, 0.05) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
    }

    .container {
        max-width: 1400px;
        margin: 0 auto;
        position: relative;
        z-index: 1;
    }

    .glass {
        background: var(--glass);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        box-shadow: var(--shadow);
        border-radius: var(--radius);
    }

    /* Header */
    header {
        padding: 20px 24px;
        margin-bottom: 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 16px;
        animation: slideDown 0.6s ease;
    }

    .logo {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .logo-icon {
        width: 48px;
        height: 48px;
        background: var(--primary-gradient);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 12px rgba(30, 27, 75, 0.3);
    }

    .logo h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: var(--primary-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .header-actions {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
    }

    /* Buttons */
    .btn {
        padding: 10px 20px;
        border: none;
        border-radius: var(--radius-sm);
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        white-space: nowrap;
    }

    .btn-primary {
        background: var(--primary-gradient);
        color: white;
        box-shadow: 0 4px 12px rgba(30, 27, 75, 0.3);
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(30, 27, 75, 0.4);
    }

    .btn-success {
        background: linear-gradient(135deg, var(--success) 0%, var(--success-light) 100%);
        color: white;
        box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3);
    }

    .btn-danger {
        background: linear-gradient(135deg, var(--danger) 0%, var(--danger-light) 100%);
        color: white;
        box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
    }

    .btn-secondary {
        background: rgba(100, 116, 139, 0.1);
        color: var(--text);
        border: 1px solid rgba(100, 116, 139, 0.2);
    }

    .btn-secondary:hover {
        background: rgba(100, 116, 139, 0.15);
    }

    .btn-sm {
        padding: 6px 12px;
        font-size: 0.85rem;
    }

    .btn:active {
        transform: scale(0.98);
    }

    /* Dashboard Cards */
    .dashboard {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
        animation: slideUp 0.6s ease 0.1s both;
    }

    .stat-card {
        padding: 20px;
        transition: var(--transition);
    }

    .stat-card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-lg);
    }

    .stat-label {
        font-size: 0.85rem;
        color: var(--text-light);
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .stat-value {
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--primary);
    }

    .stat-card.success .stat-value { color: var(--success); }
    .stat-card.warning .stat-value { color: var(--accent); }
    .stat-card.danger .stat-value { color: var(--danger); }

    /* Toolbar */
    .toolbar {
        padding: 20px;
        margin-bottom: 24px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
        animation: slideUp 0.6s ease 0.2s both;
    }

    .search-box {
        flex: 1;
        min-width: 250px;
        position: relative;
    }

    .search-box input {
        width: 100%;
        padding: 12px 16px 12px 44px;
        border: 1px solid rgba(100, 116, 139, 0.2);
        border-radius: var(--radius-sm);
        font-size: 0.95rem;
        background: rgba(255, 255, 255, 0.5);
        backdrop-filter: blur(10px);
        transition: var(--transition);
    }

    .search-box input:focus {
        outline: none;
        border-color: var(--primary-light);
        box-shadow: 0 0 0 3px rgba(55, 48, 163, 0.1);
    }

    .search-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-light);
    }

    /* Customer Cards */
    .customers-grid {
        display: grid;
        gap: 16px;
        animation: slideUp 0.6s ease 0.3s both;
    }

    .customer-card {
        padding: 20px;
        cursor: pointer;
        transition: var(--transition);
        position: relative;
        overflow: hidden;
    }

    .customer-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 4px;
        height: 100%;
        background: var(--primary-gradient);
        transition: var(--transition);
    }

    .customer-card.overdue::before {
        background: linear-gradient(180deg, var(--danger) 0%, var(--danger-light) 100%);
    }

    .customer-card.due-soon::before {
        background: linear-gradient(180deg, var(--accent) 0%, var(--accent-light) 100%);
    }

    .customer-card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-lg);
    }

    .customer-header {
        display: flex;
        justify-content: space-between;
        align-items: start;
        margin-bottom: 16px;
        flex-wrap: wrap;
        gap: 12px;
    }

    .customer-name {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--primary);
        cursor: pointer;
        transition: var(--transition);
    }

    .customer-name:hover {
        color: var(--primary-light);
    }

    .badge {
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 4px;
    }

    .badge-overdue {
        background: rgba(220, 38, 38, 0.1);
        color: var(--danger);
    }

    .badge-due {
        background: rgba(245, 158, 11, 0.1);
        color: var(--accent);
    }

    .badge-paid {
        background: rgba(5, 150, 105, 0.1);
        color: var(--success);
    }

    .customer-info {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 12px;
        margin-bottom: 16px;
    }

    .info-item {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .info-label {
        font-size: 0.75rem;
        color: var(--text-light);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .info-value {
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--text);
    }

    .customer-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
    }

    /* Modal */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(8px);
        z-index: 1000;
        align-items: center;
        justify-content: center;
        padding: 16px;
        animation: fadeIn 0.3s ease;
    }

    .modal.active {
        display: flex;
    }

    .modal-content {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius);
        max-width: 700px;
        width: 100%;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: var(--shadow-lg);
        animation: scaleIn 0.3s ease;
    }

    .modal-header {
        padding: 24px;
        border-bottom: 1px solid rgba(100, 116, 139, 0.1);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .modal-title {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--primary);
    }

    .close-btn {
        width: 36px;
        height: 36px;
        border: none;
        background: rgba(100, 116, 139, 0.1);
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: var(--transition);
        font-size: 1.25rem;
    }

    .close-btn:hover {
        background: rgba(100, 116, 139, 0.2);
    }

    .modal-body {
        padding: 24px;
    }

    .detail-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 24px;
    }

    .detail-item {
        padding: 16px;
        background: rgba(248, 250, 252, 0.6);
        border-radius: var(--radius-sm);
        border: 1px solid rgba(100, 116, 139, 0.1);
    }

    /* EMI Schedule */
    .emi-schedule {
        margin-top: 24px;
    }

    .emi-schedule h3 {
        margin-bottom: 16px;
        color: var(--primary);
        font-size: 1.1rem;
    }

    .emi-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        max-height: 300px;
        overflow-y: auto;
        padding-right: 8px;
    }

    .emi-item {
        padding: 14px;
        background: rgba(248, 250, 252, 0.6);
        border-radius: var(--radius-sm);
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: 1px solid rgba(100, 116, 139, 0.1);
        transition: var(--transition);
    }

    .emi-item.paid {
        background: rgba(5, 150, 105, 0.05);
        border-color: rgba(5, 150, 105, 0.2);
    }

    .emi-info {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .emi-date {
        font-weight: 600;
        color: var(--text);
    }

    .emi-amount {
        font-size: 0.9rem;
        color: var(--text-light);
    }

    /* Form */
    .form-group {
        margin-bottom: 20px;
    }

    .form-label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: var(--text);
        font-size: 0.9rem;
    }

    .form-input, .form-textarea {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid rgba(100, 116, 139, 0.2);
        border-radius: var(--radius-sm);
        font-size: 0.95rem;
        background: rgba(255, 255, 255, 0.7);
        transition: var(--transition);
        font-family: inherit;
    }

    .form-textarea {
        resize: vertical;
        min-height: 80px;
    }

    .form-input:focus, .form-textarea:focus {
        outline: none;
        border-color: var(--primary-light);
        box-shadow: 0 0 0 3px rgba(55, 48, 163, 0.1);
    }

    .form-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
    }

    .modal-footer {
        padding: 20px 24px;
        border-top: 1px solid rgba(100, 116, 139, 0.1);
        display: flex;
        gap: 12px;
        justify-content: flex-end;
        flex-wrap: wrap;
    }

    /* Empty State */
    .empty-state {
        padding: 60px 20px;
        text-align: center;
    }

    .empty-icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 20px;
        opacity: 0.3;
    }

    .empty-text {
        font-size: 1.1rem;
        color: var(--text-light);
        margin-bottom: 20px;
    }

    /* Toast */
    .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        padding: 16px 20px;
        background: white;
        border-radius: var(--radius-sm);
        box-shadow: var(--shadow-lg);
        display: flex;
        align-items: center;
        gap: 12px;
        z-index: 2000;
        animation: slideInRight 0.3s ease;
        max-width: 400px;
    }

    .toast.success { border-left: 4px solid var(--success); }
    .toast.error { border-left: 4px solid var(--danger); }
    .toast.info { border-left: 4px solid var(--primary); }

    /* Animations */
    @keyframes slideDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
    }

    @keyframes slideInRight {
        from { opacity: 0; transform: translateX(100px); }
        to { opacity: 1; transform: translateX(0); }
    }

    /* Responsive */
    @media (max-width: 768px) {
        body { padding: 12px; }
        header { padding: 16px; }
        .logo h1 { font-size: 1.25rem; }
        .dashboard { grid-template-columns: 1fr 1fr; }
        .stat-value { font-size: 1.5rem; }
        .modal-content { max-height: 95vh; }
        .toast { bottom: 12px; right: 12px; left: 12px; max-width: none; }
    }

    @media (max-width: 480px) {
        .dashboard { grid-template-columns: 1fr; }
        .customer-info { grid-template-columns: 1fr; }
        .header-actions { width: 100%; }
        .btn { flex: 1; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
    }

    ::-webkit-scrollbar-track {
        background: rgba(100, 116, 139, 0.1);
        border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb {
        background: rgba(100, 116, 139, 0.3);
        border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
        background: rgba(100, 116, 139, 0.5);
    }
</style>
</head>
<body>
<div class="container">
    <header class="glass">
        <div class="logo">
            <div class="logo-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <path d="M7 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/>
                    <path d="M17 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/>
                    <path d="M5 17h-2v-6l2 -5h9l4 5h1a2 2 0 0 1 2 2v4h-2m-4 0h-6"/>
                </svg>
            </div>
            <div>
                <h1 data-i18n="brand">Bhagya Laxmi Motors Finance</h1>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn btn-secondary" id="langToggle">
                <span>🌐</span>
                <span id="langText">हिंदी</span>
            </button>
            <button class="btn btn-primary" id="addCustomerBtn">
                <span>➕</span>
                <span data-i18n="addCustomer">Add Customer</span>
            </button>
        </div>
    </header>

    <div class="dashboard">
        <div class="stat-card glass">
            <div class="stat-label">
                <span>👥</span>
                <span data-i18n="totalCustomers">Total Customers</span>
            </div>
            <div class="stat-value" id="totalCustomers">0</div>
        </div>
        <div class="stat-card glass">
            <div class="stat-label">
                <span>💰</span>
                <span data-i18n="totalBilled">Total Billed</span>
            </div>
            <div class="stat-value" id="totalBilled">₹0</div>
        </div>
        <div class="stat-card glass success">
            <div class="stat-label">
                <span>✅</span>
                <span data-i18n="totalReceived">Total Received</span>
            </div>
            <div class="stat-value" id="totalReceived">₹0</div>
        </div>
        <div class="stat-card glass warning">
            <div class="stat-label">
                <span>⏰</span>
                <span data-i18n="totalPending">Total Pending</span>
            </div>
            <div class="stat-value" id="totalPending">₹0</div>
        </div>
    </div>

    <div class="toolbar glass">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" data-i18n-placeholder="searchPlaceholder" placeholder="Search by name, mobile, vehicle number...">
        </div>
    </div>

    <div class="customers-grid" id="customersGrid"></div>
</div>

<!-- Customer Detail Modal -->
<div class="modal" id="detailModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 class="modal-title" data-i18n="customerDetails">Customer Details</h2>
            <button class="close-btn" onclick="closeModal('detailModal')">✕</button>
        </div>
        <div class="modal-body" id="detailBody"></div>
    </div>
</div>

<!-- Add/Edit Customer Modal -->
<div class="modal" id="customerModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 class="modal-title" id="modalTitle" data-i18n="addCustomer">Add Customer</h2>
            <button class="close-btn" onclick="closeModal('customerModal')">✕</button>
        </div>
        <div class="modal-body">
            <form id="customerForm">
                <input type="hidden" id="customerId">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" data-i18n="customerName">Customer Name *</label>
                        <input type="text" class="form-input" id="customerName" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-i18n="fatherName">Father Name *</label>
                        <input type="text" class="form-input" id="fatherName" required>
                    </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" data-i18n="mobile">Mobile Number *</label>
                        <input type="tel" class="form-input" id="mobile" pattern="[0-9]{10}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-i18n="vehicleNumber">Vehicle Number *</label>
                        <input type="text" class="form-input" id="vehicleNumber" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="address">Address *</label>
                    <textarea class="form-textarea" id="address" required></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" data-i18n="loanDate">Loan Date *</label>
                        <input type="date" class="form-input" id="loanDate" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-i18n="loanAmount">Loan Amount *</label>
                        <input type="number" class="form-input" id="loanAmount" min="1" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" data-i18n="emiAmount">EMI Amount *</label>
                        <input type="number" class="form-input" id="emiAmount" min="1" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-i18n="tenure">Tenure (Months) *</label>
                        <input type="number" class="form-input" id="tenure" min="1" max="120" required>
                    </div>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('customerModal')" data-i18n="cancel">Cancel</button>
            <button class="btn btn-primary" onclick="saveCustomer()" data-i18n="save">Save</button>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal" id="deleteModal">
    <div class="modal-content" style="max-width: 450px;">
        <div class="modal-header">
            <h2 class="modal-title" data-i18n="confirmDelete">Confirm Delete</h2>
            <button class="close-btn" onclick="closeModal('deleteModal')">✕</button>
        </div>
        <div class="modal-body">
            <p data-i18n="deleteConfirmText">Are you sure you want to delete this customer? This action cannot be undone.</p>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('deleteModal')" data-i18n="cancel">Cancel</button>
            <button class="btn btn-danger" id="confirmDeleteBtn" data-i18n="delete">Delete</button>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'bhagyaLaxmiCustomers';
    let customers = [];
    let currentLang = 'en';
    let editingId = null;

    const translations = {
        en: {
            brand: 'Bhagya Laxmi Motors Finance',
            addCustomer: 'Add Customer',
            editCustomer: 'Edit Customer',
            totalCustomers: 'Total Customers',
            totalBilled: 'Total Billed',
            totalReceived: 'Total Received',
            totalPending: 'Total Pending',
            searchPlaceholder: 'Search by name, mobile, vehicle number...',
            customerDetails: 'Customer Details',
            customerName: 'Customer Name',
            fatherName: 'Father Name',
            address: 'Address',
            mobile: 'Mobile Number',
            loanDate: 'Loan Date',
            dueDate: 'Due Date',
            nextEmiDate: 'Next EMI Date',
            vehicleNumber: 'Vehicle Number',

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
        loadCustomers();
        renderCustomers();
        updateDashboard();
        setupEventListeners();
        loadLanguage();
    });

    function setupEventListeners() {
        document.getElementById('langToggle').addEventListener('click', toggleLanguage);
        document.getElementById('addCustomerBtn').addEventListener('click', () => openCustomerModal());
        document.getElementById('searchInput').addEventListener('input', (e) => searchCustomers(e.target.value));
        document.getElementById('customerForm').addEventListener('submit', (e) => e.preventDefault());
    }

    // Language Functions
    function loadLanguage() {
        const saved = localStorage.getItem('language') || 'en';
        currentLang = saved;
        updateLanguage();
    }

    function toggleLanguage() {
        currentLang = currentLang === 'en' ? 'hi' : 'en';
        localStorage.setItem('language', currentLang);
        updateLanguage();
    }

    function updateLanguage() {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (translations[currentLang][key]) {
                el.textContent = translations[currentLang][key];
            }
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            const key = el.getAttribute('data-i18n-placeholder');
            if (translations[currentLang][key]) {
                el.placeholder = translations[currentLang][key];
            }
        });
        document.getElementById('langText').textContent = currentLang === 'en' ? 'हिंदी' : 'English';
        renderCustomers();
        updateDashboard();
    }

    function t(key) {
        return translations[currentLang][key] || key;
    }

    // Data Functions
    function loadCustomers() {
        try {
            const data = localStorage.getItem(STORAGE_KEY);
            customers = data ? JSON.parse(data) : [];
            // Auto-update EMI status
            customers.forEach(autoUpdateEmiStatus);
            saveCustomers();
        } catch (e) {
            console.error('Error loading customers:', e);
            customers = [];
            showToast(t('error'), 'error');
        }
    }

    function saveCustomers() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(customers));
        } catch (e) {
            console.error('Error saving customers:', e);
            showToast(t('error'), 'error');
        }
    }

    function generateEmiSchedule(loanDate, emiAmount, tenure) {
        const schedule = [];
        const startDate = new Date(loanDate);
        for (let i = 0; i < tenure; i++) {
            const date = new Date(startDate);
            date.setMonth(date.getMonth() + i + 1);
            schedule.push({
                id: `${Date.now()}-${i}`,
                date: date.toISOString().split('T')[0],
                amount: emiAmount,
                paid: false,
                paidDate: null
            });
        }
        return schedule;
    }

    function autoUpdateEmiStatus(customer) {
        const today = new Date().toISOString().split('T')[0];
        let updated = false;
        
        customer.emiSchedule.forEach(emi => {
            if (!emi.paid && emi.date < today) {
                // Keep as unpaid but marked overdue
                updated = true;
            }
        });
        
        if (updated) {
            customer.lastUpdated = new Date().toISOString();
        }
    }

    function getNextEmiDate(customer) {
        const unpaid = customer.emiSchedule.find(emi => !emi.paid);
        return unpaid ? unpaid.date : null;
    }

    function getPaymentDue(customer) {
        const unpaid = customer.emiSchedule.filter(emi => !emi.paid);
        return unpaid.reduce((sum, emi) => sum + emi.amount, 0);
    }

    function getOverdueStatus(customer) {
        const today = new Date().toISOString().split('T')[0];
        const nextEmi = getNextEmiDate(customer);
        if (!nextEmi) return 'paid';
        if (nextEmi < today) return 'overdue';
        const due = new Date(nextEmi);
        const now = new Date();
        const daysDiff = Math.ceil((due - now) / (1000 * 60 * 60 * 24));
        if (daysDiff <= 7) return 'dueSoon';
        return 'pending';
    }

    // Render Functions
    function renderCustomers(filteredCustomers = null) {
        const grid = document.getElementById('customersGrid');
        const data = filteredCustomers || customers;
        
        if (data.length === 0) {
            grid.innerHTML = `
                <div class="empty-state glass">
                    <div class="empty-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87m-4-12a4 4 0 0 1 0 7.75"/>
                        </svg>
                    </div>
                    <div class="empty-text">${t('noCustomers')}</div>
                    <button class="btn btn-primary" onclick="openCustomerModal()">${t('addCustomer')}</button>
                </div>
            `;
            return;
        }

        grid.innerHTML = data.map(customer => {
            const status = getOverdueStatus(customer);
            const nextEmi = getNextEmiDate(customer);
            const paymentDue = getPaymentDue(customer);
            const statusClass = status === 'overdue' ? 'overdue' : status === 'dueSoon' ? 'due-soon' : '';
            const statusBadge = status === 'overdue' ? `<span class="badge badge-overdue">🔴 ${t('overdue')}</span>` :
                               status === 'dueSoon' ? `<span class="badge badge-due">🟡 ${t('dueSoon')}</span>` :
                               status === 'paid' ? `<span class="badge badge-paid">🟢 ${t('paid')}</span>` : '';

            return `
                <div class="customer-card glass ${statusClass}">
                    <div class="customer-header">
                        <h3 class="customer-name" onclick="showCustomerDetail('${customer.id}')">${customer.customerName}</h3>
                        ${statusBadge}
                    </div>
                    <div class="customer-info">
                        <div class="info-item">
                            <div class="info-label" data-i18n="mobile">${t('mobile')}</div>
                            <div class="info-value">${customer.mobile}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label" data-i18n="vehicleNumber">${t('vehicleNumber')}</div>
                            <div class="info-value">${customer.vehicleNumber}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label" data-i18n="paymentBaki">${t('paymentBaki')}</div>
                            <div class="info-value">₹${paymentDue.toLocaleString('en-IN')}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label" data-i18n="nextEmiDate">${t('nextEmiDate')}</div>
                            <div class="info-value">${nextEmi ? formatDate(nextEmi) : t('paid')}</div>
                        </div>
                    </div>
                    <div class="customer-actions">
                        <button class="btn btn-sm btn-primary" onclick="showCustomerDetail('${customer.id}')">👁️ View</button>
                        <button class="btn btn-sm btn-secondary" onclick="editCustomer('${customer.id}')" data-i18n="edit">${t('edit')}</button>
                        <button class="btn btn-sm btn-danger" onclick="confirmDelete('${customer.id}')" data-i18n="delete">${t('delete')}</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function updateDashboard() {
        let totalBilled = 0, totalReceived = 0;
        
        customers.forEach(customer => {
            customer.emiSchedule.forEach(emi => {
                totalBilled += emi.amount;
                if (emi.paid) totalReceived += emi.amount;
            });
        });

        document.getElementById('totalCustomers').textContent = customers.length;
        document.getElementById('totalBilled').textContent = '₹' + totalBilled.toLocaleString('en-IN');
        document.getElementById('totalReceived').textContent = '₹' + totalReceived.toLocaleString('en-IN');
        document.getElementById('totalPending').textContent = '₹' + (totalBilled - totalReceived).toLocaleString('en-IN');
    }

    function searchCustomers(query) {
        const q = query.toLowerCase().trim();
        if (!q) {
            renderCustomers();
            return;
        }
        const filtered = customers.filter(c => 
            c.customerName.toLowerCase().includes(q) ||
            c.mobile.includes(q) ||
            c.vehicleNumber.toLowerCase().includes(q) ||
            c.fatherName.toLowerCase().includes(q)
        );
        renderCustomers(filtered);
    }

    // Modal Functions
    function openModal(id) {
        document.getElementById(id).classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove('active');
        document.body.style.overflow = '';
        if (id === 'customerModal') {
            document.getElementById('customerForm').reset();
            editingId = null;
        }
    }

    function openCustomerModal(customerId = null) {
        editingId = customerId;
        const form = document.getElementById('customerForm');
        const title = document.getElementById('modalTitle');
        
        if (customerId) {
            const customer = customers.find(c => c.id === customerId);
            if (customer) {
                title.textContent = t('editCustomer');
                document.getElementById('customerId').value = customer.id;
                document.getElementById('customerName').value = customer.customerName;
                document.getElementById('fatherName').value = customer.fatherName;
                document.getElementById('mobile').value = customer.mobile;
                document.getElementById('vehicleNumber').value = customer.vehicleNumber;
                document.getElementById('address').value = customer.address;
                document.getElementById('loanDate').value = customer.loanDate;
                document.getElementById('loanAmount').value = customer.loanAmount;
                document.getElementById('emiAmount').value = customer.emiAmount;
                document.getElementById('tenure').value = customer.tenure;
            }
        } else {
            title.textContent = t('addCustomer');
            form.reset();
            document.getElementById('loanDate').value = new Date().toISOString().split('T')[0];
        }
        openModal('customerModal');
    }

    function showCustomerDetail(customerId) {
        const customer = customers.find(c => c.id === customerId);
        if (!customer) return;

        const nextEmi = getNextEmiDate(customer);
        const paymentDue = getPaymentDue(customer);
        const totalPaid = customer.emiSchedule.filter(e => e.paid).reduce((sum, e) => sum + e.amount, 0);
        const paidCount = customer.emiSchedule.filter(e => e.paid).length;

        const emiListHtml = customer.emiSchedule.map((emi, index) => `
            <div class="emi-item ${emi.paid ? 'paid' : ''}">
                <div class="emi-info">
                    <div class="emi-date">EMI ${index + 1} - ${formatDate(emi.date)}</div>
                    <div class="emi-amount">₹${emi.amount.toLocaleString('en-IN')} ${emi.paid ? `(Paid on ${formatDate(emi.paidDate)})` : ''}</div>
                </div>
                ${!emi.paid ? `<button class="btn btn-sm btn-success" onclick="markEmiPaid('${customer.id}', '${emi.id}')">${t('markPaid')}</button>` : '<span style="color: var(--success); font-weight: 600;">✓ Paid</span>'}
            </div>
        `).join('');

        document.getElementById('detailBody').innerHTML = `
            <div class="detail-grid">
                <div class="detail-item">
                    <div class="info-label" data-i18n="customerName">${t('customerName')}</div>
                    <div class="info-value">${customer.customerName}</div>
                </div>
                <div class="detail-item">
                    <div class="info-label" data-i18n="fatherName">${t('fatherName')}</div>
                    <div class="info-value">${customer.fatherName}</div>
                </div>
                <div class="detail-item">
                    <div class="info-label" data-i18n="mobile">${t('mobile')}</div>
                    <div class="info-value">${customer.mobile}</div>
                </div>
                <div class="detail-item">
                    <div class="info-label" data-i18n="vehicleNumber">${t('vehicleNumber')}</div>
                    <div class="info-value">${customer.vehicleNumber}</div>
                </div>
                <div class="detail-item" style="grid-column: 1/-1;">
                    <div class="info-label" data-i18n="address">${t('address')}</div>
                    <div class="info-value">${customer.address}</div>
                </div>
                <div class="detail-item">
                    <div class="info-label" data-i18n="loanDate">${t('loanDate')}</div>
                    <div class="info-value">${formatDate(customer.loanDate)}</div>
                </div>
                <div class="detail-item">
                    <div class="info-label" data-i18n="loanAmount">${t('loanAmount')}</div>
                    <div class="info-value">₹${customer.loanAmount.toLocaleString('en-IN')}</div>
                </div>
                <div class="detail-item">
                    <div class="info-label" data-i18n="emiAmount">${t('emiAmount')}</div>
                    <div class="info-value">₹${customer.emiAmount.toLocaleString('en-IN')}</div>
                </div>
                <div class="detail-item">
                    <div class="info-label" data-i18n="nextEmiDate">${t('nextEmiDate')}</div>
                    <div class="info-value">${nextEmi ? formatDate(nextEmi) : t('paid')}</div>
                </div>
                <div class="detail-item">
                    <div class="info-label">${t('paymentBaki')}</div>
                    <div class="info-value" style="color: var(--accent);">₹${paymentDue.toLocaleString('en-IN')}</div>
                </div>
                <div class="detail-item">
                    <div class="info-label">Paid EMIs</div>
                    <div class="info-value" style="color: var(--success);">${paidCount} / ${customer.tenure} (₹${totalPaid.toLocaleString('en-IN')})</div>
                </div>
            <div class="emi-schedule">
                <h3 data-i18n="emiSchedule">${t('emiSchedule')}</h3>
                <div class="emi-list">${emiListHtml}</div>
            </div>
            <div class="modal-footer" style="border: none; padding: 24px 0 0 0;">
                <button class="btn btn-secondary" onclick="editCustomer('${customer.id}')" data-i18n="edit">${t('edit')}</button>
                <button class="btn btn-danger" onclick="confirmDelete('${customer.id}')" data-i18n="delete">${t('delete')}</button>
            </div>
        `;
        openModal('detailModal');
    }

    // CRUD Functions
    function saveCustomer() {
        const form = document.getElementById('customerForm');
        if (!form.checkValidity()) {
            form.reportValidity();
            return;
        }

        const mobile = document.getElementById('mobile').value;
        if (!/^[0-9]{10}$/.test(mobile)) {
            showToast(t('invalidMobile'), 'error');
            return;
        }

        const customerData = {
            id: editingId || Date.now().toString(),
            customerName: document.getElementById('customerName').value.trim(),
            fatherName: document.getElementById('fatherName').value.trim(),
            mobile: mobile,
            vehicleNumber: document.getElementById('vehicleNumber').value.trim().toUpperCase(),
            address: document.getElementById('address').value.trim(),
            loanDate: document.getElementById('loanDate').value,
            loanAmount: parseFloat(document.getElementById('loanAmount').value),
            emiAmount: parseFloat(document.getElementById('emiAmount').value),
            tenure: parseInt(document.getElementById('tenure').value),
            createdAt: editingId ? customers.find(c => c.id === editingId).createdAt : new Date().toISOString(),
            lastUpdated: new Date().toISOString()
        };

        if (editingId) {
            const index = customers.findIndex(c => c.id === editingId);
            const oldCustomer = customers[index];
            customerData.emiSchedule = oldCustomer.emiSchedule;
            customers[index] = customerData;
        } else {
            customerData.emiSchedule = generateEmiSchedule(customerData.loanDate, customerData.emiAmount, customerData.tenure);
            customers.push(customerData);
        }

        saveCustomers();
        renderCustomers();
        updateDashboard();
        closeModal('customerModal');
        showToast(t('customerSaved'), 'success');
    }

    function editCustomer(customerId) {
        closeModal('detailModal');
        openCustomerModal(customerId);
    }

    function confirmDelete(customerId) {
        const confirmBtn = document.getElementById('confirmDeleteBtn');
        confirmBtn.onclick = () => deleteCustomer(customerId);
        openModal('deleteModal');
    }

    function deleteCustomer(customerId) {
        customers = customers.filter(c => c.id !== customerId);
        saveCustomers();
        renderCustomers();
        updateDashboard();
        closeModal('deleteModal');
        closeModal('detailModal');
        showToast(t('customerDeleted'), 'success');
    }

    function markEmiPaid(customerId, emiId) {
        const customer = customers.find(c => c.id === customerId);
        if (!customer) return;

        const emi = customer.emiSchedule.find(e => e.id === emiId);
        if (emi && !emi.paid) {
            emi.paid = true;
            emi.paidDate = new Date().toISOString().split('T')[0];
            customer.lastUpdated = new Date().toISOString();
            saveCustomers();
            showCustomerDetail(customerId);
            renderCustomers();
            updateDashboard();
            showToast(t('emiPaid'), 'success');
        }
    }

    // Utility Functions
    function formatDate(dateStr) {
        const date = new Date(dateStr + 'T00:00:00');
        return date.toLocaleDateString(currentLang === 'hi' ? 'hi-IN' : 'en-IN', {
            day: '2-digit',
            month: 'short',
            year: 'numeric'
        });
    }

    function showToast(message, type = 'info') {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();

        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `
            ${type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ'} 
            <span>${message}</span>
        `;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // Close modal on outside click
    document.addEventListener('click', (e) => {
        if (e.target.classList.contains('modal')) {
            e.target.classList.remove('active');
            document.body.style.overflow = '';
        }
    });
</script>
